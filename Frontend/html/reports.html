<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking History | Smart Queue</title>
  <link rel="stylesheet" href="../css/history.css">
  <script src="https://kit.fontawesome.com/4f0b3a7f9d.js" crossorigin="anonymous"></script>
</head>
<body>
  <header class="page-header">
    <div class="container nav-bar">
      <a href="index.html" class="brand">
        <span class="brand-icon"><i class="fa-solid fa-clock"></i></span>
        <span>Smart Queue</span>
      </a>

      <div class="nav-actions">
        <a href="index.html" class="nav-link">Home</a>
        <a href="queue.html" class="nav-link">Queue</a>
        <a href="reports.html" class="nav-link">Reports</a>
      </div>
    </div>
  </header>

  <main class="history-page">
    <div class="container">
      <section class="history-hero">
        <div>
          <p class="section-tag">BOOKING HISTORY</p>
          <h1>View Booking History</h1>
          <p class="hero-text">
            Search and filter token bookings using phone number, token number, customer name and booking status.
          </p>
        </div>
      </section>

      <section class="filter-section">
        <div class="filter-card">
          <div class="search-box">
            <label for="searchInput">Search</label>
            <input type="text" id="searchInput" placeholder="Search by name / phone / token">
          </div>

          <div class="status-filter-box">
            <label for="statusFilter">Filter by Status</label>
            <select id="statusFilter">
              <option value="All">All</option>
              <option value="Waiting">Waiting</option>
              <option value="Serving">Serving</option>
              <option value="Completed">Completed</option>
              <option value="Skipped">Skipped</option>
            </select>
          </div>
        </div>
      </section>

      <section class="history-list-section">
        <div id="historyEmptyState" class="empty-state hidden">
          <i class="fa-solid fa-inbox"></i>
          <h3>No booking history found</h3>
          <p>No booking records are available right now.</p>
          <a href="book.html" class="book-btn">Book Token</a>
        </div>

        <div id="historyList" class="history-list"></div>
      </section>
    </div>
  </main>

  <script src="../js/history.js"></script>
</body>
</html>
