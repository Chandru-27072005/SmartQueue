<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Smart Queue</title>
  <link rel="stylesheet" href="../css/admin.css">
  <script src="https://kit.fontawesome.com/4f0b3a7f9d.js" crossorigin="anonymous"></script>
</head>
<body>
  <main class="admin-login-page">
    <div class="login-card">
      <div class="login-icon">
        <i class="fa-solid fa-user-shield"></i>
      </div>

      <h1>Admin Login</h1>
      <p class="login-subtitle">Login to manage tokens, queue status and bookings.</p>

      <form id="adminLoginForm" class="admin-login-form">
        <div class="form-group">
          <label for="adminUsername">Username</label>
          <input type="text" id="adminUsername" placeholder="Enter admin username">
          <small class="error" id="usernameError"></small>
        </div>

        <div class="form-group">
          <label for="adminPassword">Password</label>
          <input type="password" id="adminPassword" placeholder="Enter admin password">
          <small class="error" id="passwordError"></small>
        </div>

        <button type="submit" class="login-btn">
          <i class="fa-solid fa-right-to-bracket"></i>
          Login
        </button>
      </form>

      <div id="loginMessage" class="login-message hidden"></div>

      <div class="login-footer-links">
        <a href="index.html">Back to Home</a>
        <a href="queue.html">View Queue</a>
      </div>
    </div>
  </main>

  <script src="../js/admin-login.js"></script>
</body>
</html>
